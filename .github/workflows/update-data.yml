name: Update weekend market data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build latest data
        run: npm run build:data

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/latest.json data/snapshots/latest-run.json data/snapshots/baselines.json data/history
          git diff --cached --quiet && exit 0
          git commit -m "chore: update weekend market data"
          git push
