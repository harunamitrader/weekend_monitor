<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekend Monitor</title>
    <meta
      name="description"
      content="IG weekend markets の現在値と前日終値をシンプルに確認するページ"
    />
    <link rel="stylesheet" href="./styles.css?v=20260318c" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">IG Weekend Markets</p>
        <div class="hero-row">
          <h1>Weekend Monitor</h1>
          <a
            class="hero-link"
            href="https://www.ig.com/en/weekend-trading"
            target="_blank"
            rel="noreferrer"
          >
            IG Weekend
          </a>
        </div>
        <div class="hero-meta">
          <p id="summary-text" class="summary-text">14 銘柄 / 読み込み中</p>
          <p id="updated-at" class="updated-at">読み込み中</p>
        </div>
      </header>

      <main>
        <section class="market-headline">
          <div class="headline-cell">銘柄</div>
          <div class="headline-cell align-right">現在値</div>
          <div class="headline-cell align-right">基準値</div>
          <div class="headline-cell align-right">前日比</div>
          <div class="headline-cell align-right">変化率</div>
          <div class="headline-cell align-right">リンク</div>
        </section>

        <section id="market-grid" class="market-grid" aria-live="polite"></section>
      </main>
    </div>

    <template id="market-card-template">
      <article class="market-card">
        <div class="market-title-group">
          <p class="market-name"></p>
          <p class="market-baseline"></p>
        </div>
        <div class="market-metric">
          <span class="metric-label">現在値</span>
          <span class="metric-value current-price"></span>
        </div>
        <div class="market-metric">
          <span class="metric-label">基準値</span>
          <span class="metric-value baseline-price"></span>
        </div>
        <div class="market-metric">
          <span class="metric-label">前日比</span>
          <span class="metric-value change-value"></span>
        </div>
        <div class="market-metric">
          <span class="metric-label">変化率</span>
          <span class="metric-value change-percent"></span>
        </div>
        <div class="market-actions">
          <a class="market-link" target="_blank" rel="noreferrer">開く</a>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
